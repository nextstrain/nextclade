$schema: http://json-schema.org/draft-07/schema#
title: AuspiceMetaExtensionsNextclade
description: 'Nextclade extensions to Auspice JSON format. See also: https://github.com/nextstrain/augur/blob/master/augur/data/schema-export-v2.json'
type: object
properties:
  clade_node_attrs:
    description: Descriptions of clade-like node attributes (lineages, variants, etc.) present on tree nodes
    type: array
    items:
      $ref: '#/definitions/CladeNodeAttrKeyDesc'
  placement_mask_ranges:
    description: Genomic ranges excluded from phylogenetic placement scoring
    type: array
    items:
      $ref: '#/definitions/Range_for_Position'
  ref_nodes:
    description: Configuration for the "Relative to" reference node search feature
    allOf:
    - $ref: '#/definitions/AuspiceRefNodesDesc'
  pathogen:
    description: Embedded pathogen configuration (pathogen.json content)
    anyOf:
    - $ref: '#/definitions/VirusProperties'
    - type: 'null'
definitions:
  CladeNodeAttrKeyDesc:
    description: Description of a clade-like node attribute
    type: object
    required:
    - displayName
    - name
    properties:
      name:
        description: Machine-readable identifier, must match the key used in node_attrs on tree nodes
        type: string
      displayName:
        description: Human-readable label displayed in the UI
        type: string
      description:
        description: Tooltip text describing the attribute
        type:
        - string
        - 'null'
      hideInWeb:
        description: Exclude this attribute's column from Nextclade Web results table
        default: false
        type: boolean
      skipAsReference:
        description: Exclude this attribute from clade founder node search and relative mutation calculation
        default: false
        type: boolean
  Range_for_Position:
    description: |-
      Range of positions in a given 1-dimensional coordinate space.

      The coordinate space type parameter ensures that positions and ranges in different coordinate spaces have different Rust types and they cannot be used interchangeably.
    type: object
    required:
    - begin
    - end
    properties:
      begin:
        $ref: '#/definitions/Position'
      end:
        $ref: '#/definitions/Position'
  Position:
    type: integer
    format: int
  AuspiceRefNodesDesc:
    description: Describes search criteria in the reference tree nodes. This is used for "Relative to" feature where you can switch mutation calling source node between "reference", "parent", "clade founder" and custom nodes described using this format.
    type: object
    properties:
      default:
        description: 'Name of the default reference node to display. One of the `search[].name` values or a built-in: "__root__", "__parent__", "__clade_founder__".'
        type:
        - string
        - 'null'
      search:
        description: Custom reference node search descriptions, each corresponding to an entry in the "Relative to" dropdown
        type: array
        items:
          $ref: '#/definitions/AuspiceRefNodeSearchDesc'
      builtins:
        description: Display name and description overrides for built-in reference node types (root, parent, clade founder)
        anyOf:
        - $ref: '#/definitions/AuspiceRefNodeBuiltinsConfig'
        - type: 'null'
  AuspiceRefNodeSearchDesc:
    description: Describes criteria for selecting a reference node for the "Relative to" feature.
    type: object
    required:
    - name
    properties:
      name:
        description: Unique identifier for this search entry
        type: string
      displayName:
        description: Human-readable label for the UI dropdown
        type:
        - string
        - 'null'
      description:
        description: Tooltip text describing when this reference node applies
        type:
        - string
        - 'null'
      criteria:
        description: Match criteria (OR logic between elements). Each criterion pairs query conditions with node conditions.
        type: array
        items:
          $ref: '#/definitions/AuspiceRefNodeSearchCriteria'
  AuspiceRefNodeSearchCriteria:
    description: Search criteria pairing query sequence conditions with reference node conditions.
    type: object
    properties:
      qry:
        description: Conditions the query sequence must satisfy for this criterion to apply
        type: array
        items:
          $ref: '#/definitions/AuspiceNodeCriterion'
      node:
        description: Conditions and search algorithm for finding the matching reference node
        type: array
        items:
          $ref: '#/definitions/AuspiceRefNodeCriterion'
  AuspiceNodeCriterion:
    description: Conditions for matching a tree node by name, clade, or clade-like attributes.
    type: object
    properties:
      name:
        description: Node names to match (at least one must match)
        type: array
        items:
          type: string
      clade:
        description: Clade values to match (at least one must match)
        type: array
        items:
          type: string
      cladeNodeAttrs:
        description: Clade-like attribute values to match, keyed by attribute name. Each key requires at least one value match.
        type: object
        additionalProperties:
          type: array
          items:
            type: string
  AuspiceRefNodeCriterion:
    description: Criterion for matching a reference tree node, with a specified search algorithm.
    type: object
    properties:
      searchAlgo:
        description: Search algorithm to use when traversing the tree
        default: full
        allOf:
        - $ref: '#/definitions/AuspiceNodeSearchAlgo'
      name:
        description: Node names to match (at least one must match)
        type: array
        items:
          type: string
      clade:
        description: Clade values to match (at least one must match)
        type: array
        items:
          type: string
      cladeNodeAttrs:
        description: Clade-like attribute values to match, keyed by attribute name. Each key requires at least one value match.
        type: object
        additionalProperties:
          type: array
          items:
            type: string
  AuspiceNodeSearchAlgo:
    description: Algorithm for searching reference tree nodes in the "Relative to" feature.
    oneOf:
    - description: Traverse from the query node toward the root, return the first (nearest) match
      type: string
      enum:
      - ancestor-nearest
    - description: Traverse from the query node toward the root, return the last (earliest/deepest) match
      type: string
      enum:
      - ancestor-earliest
    - description: Linear search over all tree nodes until the first match
      type: string
      enum:
      - full
  AuspiceRefNodeBuiltinsConfig:
    description: Display name and description overrides for all built-in reference node types.
    type: object
    properties:
      __root__:
        description: Config for the root reference node (reference sequence)
        anyOf:
        - $ref: '#/definitions/AuspiceRefNodeBuiltinConfig'
        - type: 'null'
      __parent__:
        description: Config for the parent (nearest) reference node
        anyOf:
        - $ref: '#/definitions/AuspiceRefNodeBuiltinConfig'
        - type: 'null'
      __clade_founder__:
        description: Config for the clade founder reference node
        anyOf:
        - $ref: '#/definitions/AuspiceRefNodeBuiltinConfig'
        - type: 'null'
  AuspiceRefNodeBuiltinConfig:
    description: Display name and description overrides for a built-in reference node type.
    type: object
    properties:
      displayName:
        description: Override display name for this built-in reference node type
        type:
        - string
        - 'null'
      description:
        description: Override description for this built-in reference node type
        type:
        - string
        - 'null'
  VirusProperties:
    title: PathogenJson
    description: pathogen.json dataset file. Contains external configuration and data specific for a particular pathogen.
    examples:
    - schemaVersion: 3.0.0
      attributes:
        name: Influenza A H3N2 HA
        reference name: A/Wisconsin/67/2005-egg
        reference accession: CY163680
        segment: ha
      shortcuts:
      - flu_h3n2_ha_broad
      - nextstrain/flu/h3n2/ha/wisconsin-67-2005
      defaultCds: HA1
      cdsOrderPreference:
      - HA1
      - HA2
      mutLabels:
        nucMutLabelMap:
          159A:
          - T160K
          460T:
          - N155H
      qc:
        missingData:
          enabled: true
          missingDataThreshold: 100.0
          scoreBias: 10.0
        mixedSites:
          enabled: true
          mixedSitesThreshold: 4
        privateMutations:
          enabled: true
          weightReversionSubstitutions: 1.0
          weightReversionDeletions: 1.0
          weightLabeledSubstitutions: 2.0
          weightLabeledDeletions: 1.0
          weightUnlabeledSubstitutions: 1.0
          weightUnlabeledDeletions: 1.0
          typical: 5.0
          cutoff: 15.0
        snpClusters:
          enabled: true
          windowSize: 100
          clusterCutOff: 5
          scoreWeight: 50.0
        frameShifts:
          enabled: true
          ignoredFrameShifts:
          - cdsName: ORF1a
            codonRange:
              begin: 3675
              end: 3675
          scoreWeight: 75.0
        stopCodons:
          enabled: true
          ignoredStopCodons:
          - cdsName: N
            codon: 417
          - cdsName: ORF3a
            codon: 238
          scoreWeight: 75.0
      phenotypeData:
      - name: receptor_binding
        nameFriendly: Receptor Binding
        description: Predicts receptor binding specificity and affinity
        cds: HA1
        aaRange:
          begin: 120
          end: 260
        ignore:
          clades:
          - 3C.2A
          - 3C.3A
        data:
        - name: receptor_binding
          weight: 1.0
          locations:
            '145': 0.4
            '155':
              H: 1.2
              N: 0.8
              default: 0.0
            '226': 0.6
      aaMotifs:
      - name: glycosylation
        nameShort: Glyc.
        nameFriendly: Glycosylation
        description: N-linked glycosylation motifs (N-X-S/T with X any amino acid other than P)
        motifs:
        - N[^P][ST]
        includeCdses:
        - cds: HA1
        - cds: HA2
          ranges:
          - begin: 0
            end: 186
    type: object
    required:
    - schemaVersion
    properties:
      schemaVersion:
        description: Schema version for this pathogen.json file. Currently "3.0.0".
        type: string
      attributes:
        description: 'Dataset attributes: name, reference info, status flags (deprecated, experimental)'
        allOf:
        - $ref: '#/definitions/PathogenAttributes'
      shortcuts:
        description: Short aliases for the dataset name, used in CLI and URL parameters (e.g. "sars-cov-2", "rsv_a").
        type: array
        items:
          type: string
      meta:
        description: Dataset metadata such as official name, creation timestamp, and update history.
        allOf:
        - $ref: '#/definitions/DatasetMeta'
      files:
        description: Filenames of other dataset input files (reference FASTA, genome annotation, tree, examples).
        allOf:
        - $ref: '#/definitions/DatasetFiles'
      defaultCds:
        description: CDS shown by default in the Nextclade Web sequence view (e.g. "S", "HA1").
        type:
        - string
        - 'null'
      cdsOrderPreference:
        description: Preferred display order of CDS names in the Nextclade Web dropdown.
        type: array
        items:
          type: string
      mutLabels:
        description: Mapping from nucleotide and amino acid mutations to human-readable labels (e.g. clade-defining mutations).
        default: {}
        allOf:
        - $ref: '#/definitions/LabelledMutationsConfig'
      qc:
        description: Quality control rule configuration. If absent, no QC checks are performed.
        anyOf:
        - $ref: '#/definitions/QcConfig'
        - type: 'null'
      generalParams:
        description: General analysis parameters (e.g. includeReference, inOrder, replaceUnknown).
        anyOf:
        - $ref: '#/definitions/NextcladeGeneralParamsOptional'
        - type: 'null'
      alignmentParams:
        description: Pairwise alignment algorithm parameters (gap penalties, seed matching, band width).
        anyOf:
        - $ref: '#/definitions/AlignPairwiseParamsOptional'
        - type: 'null'
      treeBuilderParams:
        description: Phylogenetic tree builder parameters (greedy refinement, masked mutation weight).
        anyOf:
        - $ref: '#/definitions/TreeBuilderParamsOptional'
        - type: 'null'
      aaChangesParams:
        description: Parameters for amino acid change detection and grouping.
        anyOf:
        - $ref: '#/definitions/AaChangesParamsOptional'
        - type: 'null'
      phenotypeData:
        description: Phenotype scoring configuration (e.g. ACE2 binding, immune escape) with per-position coefficients.
        type:
        - array
        - 'null'
        items:
          $ref: '#/definitions/PhenotypeData'
      aaMotifs:
        description: Amino acid motif detection rules (e.g. glycosylation sites, cleavage sites).
        type: array
        items:
          $ref: '#/definitions/AaMotifsDesc'
      versions:
        description: Available dataset versions. Populated from the dataset index, not from pathogen.json directly.
        type: array
        items:
          $ref: '#/definitions/DatasetVersion'
      version:
        description: Current version of this dataset.
        anyOf:
        - $ref: '#/definitions/DatasetVersion'
        - type: 'null'
      compatibility:
        description: Minimum Nextclade CLI and Web versions required to use this dataset.
        anyOf:
        - $ref: '#/definitions/DatasetCompatibility'
        - type: 'null'
      maintenance:
        description: Contact and documentation URLs for dataset maintainers.
        anyOf:
        - $ref: '#/definitions/DatasetMaintenance'
        - type: 'null'
  PathogenAttributes:
    description: Pathogen metadata attributes with recognized keys and extensibility
    type: object
    properties:
      name:
        description: Human-readable dataset name
        type:
        - string
        - 'null'
      reference name:
        description: Name of the reference sequence
        type:
        - string
        - 'null'
      reference accession:
        description: Accession number of the reference sequence
        type:
        - string
        - 'null'
    additionalProperties: true
  DatasetMeta:
    description: 'Dataset-level metadata: authorship and project links.'
    type: object
    properties:
      source code:
        description: URL to the dataset source code repository
        type:
        - string
        - 'null'
      bugs:
        description: URL to the bug tracker or issue page
        type:
        - string
        - 'null'
      authors:
        description: List of dataset authors or maintainers
        type: array
        items:
          type: string
  DatasetFiles:
    description: Filenames of dataset components, relative to the dataset version directory.
    examples:
    - reference: reference.fasta
      pathogenJson: pathogen.json
      genomeAnnotation: genome_annotation.gff3
      treeJson: tree.json
      examples: sequences.fasta
      readme: README.md
      changelog: CHANGELOG.md
    type: object
    properties:
      reference:
        description: Reference sequence FASTA file (e.g. "reference.fasta")
        type:
        - string
        - 'null'
      pathogenJson:
        description: Pathogen configuration file (e.g. "pathogen.json")
        type:
        - string
        - 'null'
      genomeAnnotation:
        description: Genome annotation in GFF3 format (e.g. "genome_annotation.gff3")
        type:
        - string
        - 'null'
      treeJson:
        description: Reference phylogenetic tree in Auspice JSON format (e.g. "tree.json")
        type:
        - string
        - 'null'
      examples:
        description: Example query sequences for testing (e.g. "sequences.fasta")
        type:
        - string
        - 'null'
      readme:
        description: Dataset README documentation file
        type:
        - string
        - 'null'
      changelog:
        description: Dataset changelog file
        type:
        - string
        - 'null'
  LabelledMutationsConfig:
    description: Mapping from specific mutations to human-readable labels (e.g. clade-defining or drug-resistance mutations).
    examples:
    - nucMutLabelMap:
        159A:
        - T160K
        460T:
        - N155H
    type: object
    properties:
      nucMutLabelMap:
        description: 'Nucleotide mutation labels: maps each nucleotide genotype (position + query nucleotide) to a list of label strings.'
        type: object
        additionalProperties:
          type: array
          items:
            type: string
      aaMutLabelMap:
        description: 'Amino acid mutation labels: maps each amino acid genotype (CDS + position + query amino acid) to a list of label strings.'
        type: object
        additionalProperties:
          type: array
          items:
            type: string
  QcConfig:
    description: Configuration for QC rules
    examples:
    - missingData:
        enabled: true
        missingDataThreshold: 100.0
        scoreBias: 10.0
      mixedSites:
        enabled: true
        mixedSitesThreshold: 4
      privateMutations:
        enabled: true
        weightReversionSubstitutions: 1.0
        weightReversionDeletions: 1.0
        weightLabeledSubstitutions: 2.0
        weightLabeledDeletions: 1.0
        weightUnlabeledSubstitutions: 1.0
        weightUnlabeledDeletions: 1.0
        typical: 5.0
        cutoff: 15.0
      snpClusters:
        enabled: true
        windowSize: 100
        clusterCutOff: 5
        scoreWeight: 50.0
      frameShifts:
        enabled: true
        ignoredFrameShifts:
        - cdsName: ORF1a
          codonRange:
            begin: 3675
            end: 3675
        scoreWeight: 75.0
      stopCodons:
        enabled: true
        ignoredStopCodons:
        - cdsName: N
          codon: 417
        - cdsName: ORF3a
          codon: 238
        scoreWeight: 75.0
    type: object
    properties:
      missingData:
        description: Configuration for the "missing data" (N) rule
        default:
          enabled: false
          missingDataThreshold: 0.0
          scoreBias: 0.0
        allOf:
        - $ref: '#/definitions/QcRulesConfigMissingData'
      mixedSites:
        description: Configuration for the "mixed sites" (M) rule
        default:
          enabled: false
          mixedSitesThreshold: 0
        allOf:
        - $ref: '#/definitions/QcRulesConfigMixedSites'
      privateMutations:
        description: Configuration for the "private mutations" (P) rule
        default:
          enabled: false
          weightReversionSubstitutions: 0.0
          weightReversionDeletions: 0.0
          weightLabeledSubstitutions: 0.0
          weightLabeledDeletions: 0.0
          weightUnlabeledSubstitutions: 0.0
          weightUnlabeledDeletions: 0.0
          typical: 0.0
          cutoff: 0.0
        allOf:
        - $ref: '#/definitions/QcRulesConfigPrivateMutations'
      snpClusters:
        description: Configuration for the "SNP clusters" (C) rule
        default:
          enabled: false
          windowSize: 0
          clusterCutOff: 0
          scoreWeight: 0.0
        allOf:
        - $ref: '#/definitions/QcRulesConfigSnpClusters'
      frameShifts:
        description: Configuration for the "frame shifts" (F) rule
        default:
          enabled: true
          scoreWeight: 75.0
        allOf:
        - $ref: '#/definitions/QcRulesConfigFrameShifts'
      stopCodons:
        description: Configuration for the "stop codons" (S) rule
        default:
          enabled: true
          scoreWeight: 75.0
        allOf:
        - $ref: '#/definitions/QcRulesConfigStopCodons'
  QcRulesConfigMissingData:
    description: Configuration for QC rule "missing data"
    examples:
    - enabled: true
      missingDataThreshold: 100.0
      scoreBias: 10.0
    type: object
    properties:
      enabled:
        default: false
        type: boolean
      missingDataThreshold:
        description: 'Number of N characters above scoreBias at which the score reaches 100. Score is linear: (totalMissing - scoreBias) * 100 / missingDataThreshold.'
        default: 0.0
        type: number
        format: double
      scoreBias:
        description: Number of N characters tolerated before the score starts increasing
        default: 0.0
        type: number
        format: double
  QcRulesConfigMixedSites:
    description: Configuration for QC rule "mixed sites"
    examples:
    - enabled: true
      mixedSitesThreshold: 4
    type: object
    properties:
      enabled:
        default: false
        type: boolean
      mixedSitesThreshold:
        description: Number of ambiguous (non-ACGTN) nucleotide positions at which the score reaches 100
        default: 0
        type: integer
        format: uint
        minimum: 0.0
  QcRulesConfigPrivateMutations:
    description: Configuration for QC rule "private mutations"
    examples:
    - enabled: true
      weightReversionSubstitutions: 1.0
      weightReversionDeletions: 1.0
      weightLabeledSubstitutions: 2.0
      weightLabeledDeletions: 1.0
      weightUnlabeledSubstitutions: 1.0
      weightUnlabeledDeletions: 1.0
      typical: 5.0
      cutoff: 15.0
    type: object
    properties:
      enabled:
        default: false
        type: boolean
      weightReversionSubstitutions:
        description: Weight multiplier for reversion substitutions in the weighted total
        default: 1.0
        type: number
        format: double
      weightReversionDeletions:
        description: Weight multiplier for reversion deletions in the weighted total
        default: 1.0
        type: number
        format: double
      weightLabeledSubstitutions:
        description: Weight multiplier for labeled substitutions (known phylogenetic markers) in the weighted total
        default: 1.0
        type: number
        format: double
      weightLabeledDeletions:
        description: Weight multiplier for labeled deletions in the weighted total
        default: 1.0
        type: number
        format: double
      weightUnlabeledSubstitutions:
        description: Weight multiplier for unlabeled substitutions in the weighted total
        default: 1.0
        type: number
        format: double
      weightUnlabeledDeletions:
        description: Weight multiplier for unlabeled deletions in the weighted total
        default: 1.0
        type: number
        format: double
      typical:
        description: Expected number of weighted private mutations for a typical sequence. Excess above this value is penalized.
        default: 0.0
        type: number
        format: double
      cutoff:
        description: Excess above `typical` at which the score reaches 100
        default: 0.0
        type: number
        format: double
  QcRulesConfigSnpClusters:
    description: Configuration for QC rule "SNP clusters"
    examples:
    - enabled: true
      windowSize: 100
      clusterCutOff: 5
      scoreWeight: 50.0
    type: object
    properties:
      enabled:
        default: false
        type: boolean
      windowSize:
        description: Size of the sliding window (in nucleotides) used to count private mutations
        default: 0
        type: integer
        format: uint
        minimum: 0.0
      clusterCutOff:
        description: Number of private mutations within a window above which the window is flagged as a cluster
        default: 0
        type: integer
        format: uint
        minimum: 0.0
      scoreWeight:
        description: QC score added per detected cluster
        default: 0.0
        type: number
        format: double
  QcRulesConfigFrameShifts:
    description: Configuration for QC rule "frame shifts"
    examples:
    - enabled: true
      ignoredFrameShifts:
      - cdsName: ORF1a
        codonRange:
          begin: 3675
          end: 3675
      scoreWeight: 75.0
    type: object
    properties:
      enabled:
        default: true
        type: boolean
      ignoredFrameShifts:
        description: Frame shifts at these locations are known and not penalized
        type: array
        items:
          $ref: '#/definitions/FrameShiftLocation'
      scoreWeight:
        description: QC score added per detected frame shift (excluding ignored ones)
        default: 75.0
        type: number
        format: double
  FrameShiftLocation:
    description: Location of a frame shift in a CDS
    examples:
    - cdsName: ORF1a
      codonRange:
        begin: 3675
        end: 3675
    type: object
    properties:
      cdsName:
        description: Name of the coding sequence (CDS) containing the frame shift
        default: ''
        type: string
      codonRange:
        description: Codon range affected by the frame shift (0-indexed, half-open)
        default:
          begin: 0
          end: 0
        allOf:
        - $ref: '#/definitions/Range_for_Position'
  QcRulesConfigStopCodons:
    description: Configuration for QC rule "stop codons"
    examples:
    - enabled: true
      ignoredStopCodons:
      - cdsName: N
        codon: 417
      - cdsName: ORF3a
        codon: 238
      scoreWeight: 75.0
    type: object
    properties:
      enabled:
        default: true
        type: boolean
      ignoredStopCodons:
        description: Premature stop codons at these locations are known and not penalized
        type: array
        items:
          $ref: '#/definitions/StopCodonLocation'
      scoreWeight:
        description: QC score added per premature stop codon (excluding ignored ones)
        default: 75.0
        type: number
        format: double
  StopCodonLocation:
    description: Location of a stop codon in a CDS
    examples:
    - cdsName: N
      codon: 417
    type: object
    required:
    - cdsName
    - codon
    properties:
      cdsName:
        description: Name of the coding sequence (CDS) containing the stop codon
        type: string
      codon:
        description: 0-indexed codon position of the stop codon within the CDS
        type: integer
        format: uint
        minimum: 0.0
  NextcladeGeneralParamsOptional:
    type: object
    properties:
      includeReference:
        description: Whether to include aligned reference nucleotide sequence into output nucleotide sequence FASTA file and reference peptides into output peptide FASTA files.
        type:
        - boolean
        - 'null'
      includeNearestNodeInfo:
        description: Whether to include the list of nearest nodes to the outputs
        type:
        - boolean
        - 'null'
      inOrder:
        description: |-
          Emit output sequences in-order.

          With this flag the program will wait for results from the previous sequences to be written to the output files before writing the results of the next sequences, preserving the same order as in the input file. Due to variable sequence processing times, this might introduce unnecessary waiting times, but ensures that the resulting sequences are written in the same order as they occur in the inputs (except for sequences which have errors). By default, without this flag, processing might happen out of order, which is faster, due to the elimination of waiting, but might also lead to results written out of order - the order of results is not specified and depends on thread scheduling and processing times of individual sequences.

          This option is only relevant when `--jobs` is greater than 1 or is omitted.

          Note: the sequences which trigger errors during processing will be omitted from outputs, regardless of this flag.
        type:
        - boolean
        - 'null'
      replaceUnknown:
        description: |-
          Replace unknown nucleotide characters with 'N'

          By default, the sequences containing unknown nucleotide characters are skipped with a warning - they are not analyzed and not included into results. If this flag is provided, then before the alignment, all unknown characters are replaced with 'N'. This replacement allows to analyze these sequences.

          The following characters are considered known:  '-', 'A', 'B', 'C', 'D', 'G', 'H', 'K', 'M', 'N', 'R', 'S', 'T', 'V', 'W', 'Y'
        type:
        - boolean
        - 'null'
  AlignPairwiseParamsOptional:
    description: 'Parameters controlling pairwise sequence alignment against a reference. Configurable via CLI arguments, pathogen.json, or alignment presets. Precedence: CLI arguments > pathogen.json > preset defaults.'
    type: object
    properties:
      alignmentPreset:
        description: Alignment parameter presets. EXPERIMENTAL feature subject to adjustments.
        anyOf:
        - $ref: '#/definitions/AlignmentPreset'
        - type: 'null'
      minLength:
        description: |-
          Minimum length of nucleotide sequence to consider for alignment.

          If a sequence is shorter than that, alignment will not be attempted and a warning will be emitted. When adjusting this parameter, note that alignment of short sequences can be unreliable.
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
      penaltyGapExtend:
        description: Penalty for extending a gap in alignment. If zero, all gaps regardless of length incur the same penalty.
        type:
        - integer
        - 'null'
        format: int32
      penaltyGapOpen:
        description: Penalty for opening of a gap in alignment. A higher penalty results in fewer gaps and more mismatches. Should be less than `--penalty-gap-open-in-frame` to avoid gaps in genes.
        type:
        - integer
        - 'null'
        format: int32
      penaltyGapOpenInFrame:
        description: As `--penalty-gap-open`, but for opening gaps at the beginning of a codon. Should be greater than `--penalty-gap-open` and less than `--penalty-gap-open-out-of-frame`, to avoid gaps in genes, but favor gaps that align with codons.
        type:
        - integer
        - 'null'
        format: int32
      penaltyGapOpenOutOfFrame:
        description: As `--penalty-gap-open`, but for opening gaps in the body of a codon. Should be greater than `--penalty-gap-open-in-frame` to favor gaps that align with codons.
        type:
        - integer
        - 'null'
        format: int32
      penaltyMismatch:
        description: Penalty for aligned nucleotides or amino acids that differ in state during alignment. Note that this is redundantly parameterized with `--score-match`
        type:
        - integer
        - 'null'
        format: int32
      scoreMatch:
        description: Score for matching states in nucleotide or amino acid alignments.
        type:
        - integer
        - 'null'
        format: int32
      maxBandArea:
        description: Maximum area of the band in the alignment matrix. Alignments with large bands are slow to compute and require substantial memory. Alignment of sequences requiring bands with area larger than this value, will not be attempted and a warning will be emitted.
        type:
        - integer
        - 'null'
        format: uint64
        minimum: 0.0
      retryReverseComplement:
        description: Retry seed matching step with a reverse complement if the first attempt failed
        type:
        - boolean
        - 'null'
      noTranslatePastStop:
        description: If this flag is present, the amino acid sequences will be truncated at the first stop codon, if mutations or sequencing errors cause premature stop codons to be present. No amino acid mutations in the truncated region will be recorded.
        type:
        - boolean
        - 'null'
      leftTerminalGapsFree:
        type:
        - boolean
        - 'null'
      rightTerminalGapsFree:
        type:
        - boolean
        - 'null'
      excessBandwidth:
        description: Excess bandwidth for internal stripes.
        type:
        - integer
        - 'null'
        format: int32
      terminalBandwidth:
        description: Excess bandwidth for terminal stripes.
        type:
        - integer
        - 'null'
        format: int32
      gapAlignmentSide:
        description: 'Whether to align gaps on the left or right side if equally parsimonious. Default: left'
        anyOf:
        - $ref: '#/definitions/GapAlignmentSide'
        - type: 'null'
      kmerLength:
        description: Length of exactly matching k-mers used in the seed alignment of the query to the reference.
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
      kmerDistance:
        description: Interval of successive k-mers on the query sequence. Should be small compared to the query length.
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
      allowedMismatches:
        description: Exactly matching k-mers are extended to the left and right until more than `allowed_mismatches` are observed in a sliding window (`window_size`).
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
      windowSize:
        description: Size of the window within which mismatches are accumulated during seed extension
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
      minMatchLength:
        description: Minimum length of extended k-mers
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
      minSeedCover:
        description: Fraction of the query sequence that has to be covered by extended seeds to proceed with the banded alignment.
        type:
        - number
        - 'null'
        format: double
      maxAlignmentAttempts:
        description: Number of times Nextclade will retry alignment with more relaxed results if alignment band boundaries are hit
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
      maxIndel:
        description: REMOVED
      seedLength:
        description: REMOVED
      mismatchesAllowed:
        description: REMOVED
      minSeeds:
        description: REMOVED
      minMatchRate:
        description: REMOVED
      seedSpacing:
        description: REMOVED
  AlignmentPreset:
    description: Pre-defined alignment parameter presets that adjust penalties, seed matching, and band width for different sequence characteristics. Experimental feature subject to adjustments.
    oneOf:
    - description: Suitable for very similar sequences (this is the default).
      type: string
      enum:
      - default
    - description: Suitable for more diverse viruses. Uses wider alignment bands, shorter k-mers, and higher gap penalties.
      type: string
      enum:
      - high-diversity
    - description: Suitable for short and partial sequences. Reduces minimum sequence length and uses shorter k-mers with tighter seed spacing.
      type: string
      enum:
      - short-sequences
  GapAlignmentSide:
    description: Controls which side ambiguous gaps are placed on when alignment is equally parsimonious in either direction.
    oneOf:
    - description: Place ambiguous gaps on the left (5') side. This is the default.
      type: string
      enum:
      - left
    - description: Place ambiguous gaps on the right (3') side.
      type: string
      enum:
      - right
  TreeBuilderParamsOptional:
    type: object
    properties:
      withoutGreedyTreeBuilder:
        description: Disable greedy tree builder algorithm
        type:
        - boolean
        - 'null'
      maskedMutsWeight:
        type:
        - number
        - 'null'
        format: double
  AaChangesParamsOptional:
    type: object
    properties:
      aa_group_spacing:
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
      aa_group_padding:
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
  PhenotypeData:
    description: Describes a phenotype, such as receptor binding, immune escape, etc.
    examples:
    - name: receptor_binding
      nameFriendly: Receptor Binding
      description: Predicts receptor binding specificity and affinity
      cds: HA1
      aaRange:
        begin: 120
        end: 260
      ignore:
        clades:
        - 3C.2A
        - 3C.3A
      data:
      - name: receptor_binding
        weight: 1.0
        locations:
          '145': 0.4
          '155':
            H: 1.2
            N: 0.8
            default: 0.0
          '226': 0.6
    type: object
    required:
    - aaRange
    - cds
    - data
    - description
    - name
    - nameFriendly
    properties:
      name:
        description: Machine-readable identifier for this phenotype (e.g. "ace2_binding", "immune_escape").
        type: string
      nameFriendly:
        description: Human-readable display name (e.g. "ACE2 Binding", "Immune Escape").
        type: string
      description:
        description: Free-text description of what this phenotype measures.
        type: string
      cds:
        description: CDS on which this phenotype is evaluated (e.g. "S", "HA1").
        type: string
      aaRange:
        description: Amino acid range within the CDS where phenotype-relevant mutations are considered.
        allOf:
        - $ref: '#/definitions/Range_for_Position'
      ignore:
        description: Clades to exclude from phenotype scoring.
        default:
          clades: []
        allOf:
        - $ref: '#/definitions/PhenotypeDataIgnore'
      data:
        description: Per-position coefficient tables for computing the phenotype score.
        type: array
        items:
          $ref: '#/definitions/PhenotypeDataEntry'
  PhenotypeDataIgnore:
    description: Clades to exclude from phenotype scoring (e.g. outgroup clades with unreliable mutation calls).
    type: object
    properties:
      clades:
        description: List of clade names to ignore when computing phenotype scores.
        default: []
        type: array
        items:
          type: string
  PhenotypeDataEntry:
    description: A single entry in the phenotype data
    examples:
    - name: receptor_binding
      weight: 1.0
      locations:
        '145': 0.4
        '155':
          H: 1.2
          N: 0.8
          default: 0.0
        '226': 0.6
    type: object
    required:
    - locations
    - name
    - weight
    properties:
      name:
        description: Identifier for this data entry (e.g. "binding", "escape").
        type: string
      weight:
        description: Relative weight of this entry when combining multiple entries into a final phenotype score.
        type: number
        format: double
      locations:
        description: Per-position coefficients mapping amino acid reference positions to their contribution to the score.
        type: object
        additionalProperties:
          $ref: '#/definitions/PhenotypeCoeff'
  PhenotypeCoeff:
    description: Coefficient for a phenotype data entry. Can be a single value for all amino acids at a position, or a mapping from amino acids to their specific values.
    anyOf:
    - type: number
      format: double
    - type: object
      additionalProperties:
        type: number
        format: double
  AaMotifsDesc:
    description: Describes motifs in amino acid sequences, such as glycosylation sites, disulfide bonds, etc.
    examples:
    - name: glycosylation
      nameShort: Glyc.
      nameFriendly: Glycosylation
      description: N-linked glycosylation motifs (N-X-S/T with X any amino acid other than P)
      motifs:
      - N[^P][ST]
      includeCdses:
      - cds: HA1
      - cds: HA2
        ranges:
        - begin: 0
          end: 186
    type: object
    required:
    - description
    - motifs
    - name
    - nameFriendly
    - nameShort
    properties:
      name:
        description: Machine-readable identifier for this motif type (e.g. "glycosylation").
        type: string
      nameShort:
        description: Abbreviated name for compact display (e.g. "Glyc.").
        type: string
      nameFriendly:
        description: Human-readable display name (e.g. "Glycosylation").
        type: string
      description:
        description: Free-text description of what the motif represents.
        type: string
      motifs:
        description: Regular expressions defining the amino acid motifs to detect (e.g. "N[^P][ST]" for N-linked glycosylation).
        type: array
        items:
          type: string
      includeCdses:
        description: CDS regions in which to search for motifs. If empty, all CDSes are searched.
        type: array
        items:
          $ref: '#/definitions/CountAaMotifsCdsDesc'
  CountAaMotifsCdsDesc:
    description: Describes a range of amino acids in a CDS for counting motifs
    type: object
    required:
    - cds
    properties:
      cds:
        description: Name of the CDS to search for motifs (e.g. "HA1", "HA2").
        type: string
      ranges:
        description: Amino acid ranges within the CDS to restrict the search. If empty, the entire CDS is searched.
        type: array
        items:
          $ref: '#/definitions/Range_for_Position'
  DatasetVersion:
    description: A tagged release of a dataset, identified by a timestamp tag.
    examples:
    - tag: 2026-01-06--14-59-32Z
      updatedAt: 2026-01-06T14:59:32Z
      compatibility:
        cli: 3.0.0
        web: 3.0.0
    type: object
    required:
    - tag
    properties:
      tag:
        description: Version identifier in timestamp format (e.g. "2026-01-06--14-59-32Z")
        type: string
      updatedAt:
        description: ISO 8601 timestamp of when this version was published
        type:
        - string
        - 'null'
      compatibility:
        description: Minimum CLI/web versions required to use this dataset version
        anyOf:
        - $ref: '#/definitions/DatasetCompatibility'
        - type: 'null'
  DatasetCompatibility:
    description: Minimum application versions required to use a dataset version.
    type: object
    properties:
      cli:
        description: Minimum Nextclade CLI semver version (e.g. "3.0.0-alpha.0")
        type: string
      web:
        description: Minimum Nextclade Web semver version (e.g. "3.0.0-alpha.0")
        type: string
  DatasetMaintenance:
    description: Contact and documentation URLs for dataset maintenance
    type: object
    properties:
      website:
        description: URLs for the project or organization website.
        type: array
        items:
          type: string
      documentation:
        description: URLs for dataset documentation and usage guides.
        type: array
        items:
          type: string
      source code:
        description: URLs for the source code repositories used to build the dataset.
        type: array
        items:
          type: string
      issues:
        description: URLs for reporting bugs and requesting features related to the dataset.
        type: array
        items:
          type: string
      organizations:
        description: Names of organizations responsible for maintaining the dataset.
        type: array
        items:
          type: string
      authors:
        description: Names and contact information of dataset authors.
        type: array
        items:
          type: string
