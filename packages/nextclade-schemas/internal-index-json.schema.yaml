$schema: http://json-schema.org/draft-07/schema#
title: DatasetsIndexJson
type: object
required:
- collections
- schemaVersion
properties:
  collections:
    type: array
    items:
      $ref: '#/definitions/DatasetCollection'
  schemaVersion:
    type: string
  minimizerIndex:
    type: array
    items:
      $ref: '#/definitions/MinimizerIndexVersion'
definitions:
  DatasetCollection:
    type: object
    required:
    - datasets
    - meta
    properties:
      meta:
        $ref: '#/definitions/DatasetCollectionMeta'
      datasets:
        type: array
        items:
          $ref: '#/definitions/Dataset'
  DatasetCollectionMeta:
    type: object
    required:
    - id
    properties:
      id:
        type: string
      title:
        type:
        - string
        - 'null'
      description:
        type:
        - string
        - 'null'
      color:
        type:
        - string
        - 'null'
      icon:
        type:
        - string
        - 'null'
      maintainers:
        type: array
        items:
          $ref: '#/definitions/DatasetCollectionUrl'
      urls:
        type: array
        items:
          $ref: '#/definitions/DatasetCollectionUrl'
  DatasetCollectionUrl:
    type: object
    required:
    - name
    - url
    properties:
      name:
        type: string
      url:
        type: string
  Dataset:
    type: object
    required:
    - path
    properties:
      path:
        type: string
      shortcuts:
        type: array
        items:
          type: string
      attributes:
        $ref: '#/definitions/DatasetAttributes'
      meta:
        $ref: '#/definitions/DatasetMeta'
      files:
        $ref: '#/definitions/DatasetFiles'
      capabilities:
        $ref: '#/definitions/DatasetCapabilities'
      versions:
        type: array
        items:
          $ref: '#/definitions/DatasetVersion'
      version:
        $ref: '#/definitions/DatasetVersion'
      type:
        anyOf:
        - $ref: '#/definitions/DatasetType'
        - type: 'null'
      maintenance:
        anyOf:
        - $ref: '#/definitions/DatasetMaintenance'
        - type: 'null'
  DatasetAttributes:
    description: Dataset metadata attributes with recognized keys and extensibility
    type: object
    properties:
      name:
        description: Human-readable dataset name
        type:
        - string
        - 'null'
      reference name:
        description: Name of the reference sequence
        type:
        - string
        - 'null'
      reference accession:
        description: Accession number of the reference sequence
        type:
        - string
        - 'null'
      deprecated:
        description: If true, dataset is deprecated and excluded from listings by default. Authors mark a dataset as deprecated to indicate it will no longer be updated or supported. Use `--include-deprecated` CLI flag to show deprecated datasets.
        type:
        - boolean
        - 'null'
      experimental:
        description: If true, dataset is experimental and excluded with `--no-experimental` CLI flag. Authors mark a dataset as experimental when development is still in progress, or if the dataset is incomplete or of lower quality than usual. Use at own risk.
        type:
        - boolean
        - 'null'
    additionalProperties: true
  DatasetMeta:
    type: object
    properties:
      source code:
        type:
        - string
        - 'null'
      bugs:
        type:
        - string
        - 'null'
      authors:
        type: array
        items:
          type: string
  DatasetFiles:
    type: object
    properties:
      reference:
        type:
        - string
        - 'null'
      pathogenJson:
        type:
        - string
        - 'null'
      genomeAnnotation:
        type:
        - string
        - 'null'
      treeJson:
        type:
        - string
        - 'null'
      examples:
        type:
        - string
        - 'null'
      readme:
        type:
        - string
        - 'null'
      changelog:
        type:
        - string
        - 'null'
  DatasetCapabilities:
    type: object
    properties:
      clades:
        type:
        - integer
        - 'null'
        format: uint
        minimum: 0.0
      customClades:
        type: object
        additionalProperties:
          type: integer
          format: uint
          minimum: 0.0
      qc:
        type: array
        items:
          type: string
      primers:
        type:
        - boolean
        - 'null'
      other:
        type: array
        items:
          type: string
  DatasetVersion:
    type: object
    required:
    - tag
    properties:
      tag:
        type: string
      updatedAt:
        type:
        - string
        - 'null'
      compatibility:
        anyOf:
        - $ref: '#/definitions/DatasetCompatibility'
        - type: 'null'
  DatasetCompatibility:
    type: object
    properties:
      cli:
        type: string
      web:
        type: string
  DatasetType:
    type: string
    enum:
    - directory
    - auspiceJson
    - other
  DatasetMaintenance:
    description: Contact and documentation URLs for dataset maintenance
    type: object
    properties:
      website:
        type: array
        items:
          type: string
      documentation:
        type: array
        items:
          type: string
      source code:
        type: array
        items:
          type: string
      issues:
        type: array
        items:
          type: string
      organizations:
        type: array
        items:
          type: string
      authors:
        type: array
        items:
          type: string
  MinimizerIndexVersion:
    type: object
    required:
    - path
    - version
    properties:
      version:
        type: string
      path:
        type: string
